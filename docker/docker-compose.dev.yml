services:
  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile.dev
    volumes:
      - ../server:/app

  web_admin:
    build:
      context: ..
      dockerfile: docker/admin-website/Dockerfile.dev
    volumes:
      - ../admin-website:/app
    environment:
      - NODE_ENV=development
      - VITE_API_NODE_ENV=development

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
      target: dev
    image: ania_web:dev
    container_name: ania_web_dev
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ../client:/app
      - /app/node_modules
    networks:
      ania_network:
        ipv4_address: 172.20.0.103
