services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        DOMAIN: ${DOMAIN}
        PORT: ${PORT}
        DISCORD_URL: ${DISCORD_URL}
        X_URL: ${X_URL}
        YT_URL: ${YT_URL}
        TW_URL: ${TW_URL}
        API_URL: http://172.20.0.101:3000
        WEB_ADMIN_URL: http://172.20.0.102:80
        WEB_URL: http://172.20.0.103
        S3_URL: http://172.20.0.104:3900
        S3_BUCKET: ${S3_BUCKET}
    image: ania_nginx:latest
    env_file:
      - .env
    container_name: ania_nginx
    restart: unless-stopped
    expose:
      - "${PORT}"
    network_mode: host
    volumes:
      - ../data/nginx/log:/var/log/nginx

  db:
    image: mongo:8.0
    container_name: ania_db_mongo
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    env_file:
      - .env
    expose:
      - "27017"
    volumes:
      - ../data/db:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    networks:
      ania_network:
        ipv4_address: 172.20.0.100

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
      target: runner
    image: ania_web:latest
    container_name: ania_web
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - PUBLIC_SERVER_URL=http://172.20.0.101:3000
    networks:
      ania_network:
        ipv4_address: 172.20.0.103

  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    container_name: ania_server
    image: ania_server:latest
    env_file:
      - .env
    expose:
      - "3000"
    environment:
      PORT: 3000
      HOSTNAME: ${SERVER_HOSTNAME}
      MONGO_URI: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@172.20.0.100:27017/${MONGO_INITDB_DATABASE}?authSource=admin"
    networks:
      ania_network:
        ipv4_address: 172.20.0.101
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_started

  web_admin:
    build:
      context: ..
      dockerfile: docker/admin-website/Dockerfile
    container_name: ania_web_admin
    image: ania_web_admin:latest
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - VITE_API_NODE_ENV=production
    networks:
      ania_network:
        ipv4_address: 172.20.0.102

  s3:
    # DOC:
    # Primera vez (v2 no tiene "init"; asignar rol y aplicar layout):
    #   docker exec ania_s3_garage /garage status   # ver ID del nodo
    #   docker exec ania_s3_garage /garage layout assign -z dc1 -c 10G <NODE_ID>
    #   docker exec ania_s3_garage /garage layout show
    #    --> anotar <version>
    #   docker exec ania_s3_garage /garage layout apply --version <version>

    # Crear key S3 y (opcionalmente) un bucket
    #   docker exec ania_s3_garage /garage key create myuser
    #    --> anotar <KEY_ID>
    #   docker exec ania_s3_garage /garage key allow <KEY_ID> --create-bucket
    #   docker exec ania_s3_garage /garage bucket create <BUCKET_NAME>
    #   docker exec ania_s3_garage /garage bucket allow <BUCKET_NAME> --key <KEY_ID> --read --write

    build:
      context: ./garage
      dockerfile: Dockerfile
    container_name: ania_s3_garage
    image: ania_s3_garage:latest
    restart: unless-stopped
    # 3900 -> S3 API (HTTP/HTTPS)
    # 3901 -> RPC (interno entre nodos)
    # 3903 -> Admin API (HTTP/HTTPS)
    expose:
      - "3900"
      - "3901"
      - "3903"
    volumes:
      - ../data/s3-garage:/var/lib/garage
    networks:
      ania_network:
        ipv4_address: 172.20.0.104

networks:
  ania_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
