/var/log/nginx/*.log {
    daily
    rotate 128

    dateext
    dateformat -%Y-%m-%d

    compress
    delaycompress

    missingok
    notifempty

    create 0640 root root

    sharedscripts
    postrotate
        if [ -f /run/nginx.pid ]; then
            kill -USR1 `cat /run/nginx.pid`
        fi
    endscript
}