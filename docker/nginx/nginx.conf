
user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Include mime types and set default type
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Set access log level to info & main format
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time" '
                    'cs=$connection $connection_requests '
                    'xff="$http_x_forwarded_for" host="$host" '
                    'req_len=$request_length resp_len=$bytes_sent '
                    'ssl_protocol=$ssl_protocol ssl_cipher=$ssl_cipher';
    access_log /var/log/nginx/access.log combined;
    access_log /var/log/nginx/access_main.log main;
    error_log  /var/log/nginx/error.log warn;


    resolver 127.0.0.11 valid=30s ipv6=off;

    # Setting up real IP addresses
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 172.20.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Limit requests to assets
    limit_req_zone $binary_remote_addr zone=assets:10m rate=5r/s;

    server {
        listen ${PORT};
        server_name ${DOMAIN};

        # 
        root /usr/share/nginx;

        # Assets location
        location /assets/ {
            # Validate referers to prevent hotlinking
            valid_referers ${DOMAIN} *.${DOMAIN}; 
            if ($invalid_referer) { 
                return 403; 
            }

            # Disable directory listing
            autoindex off;

            # Cache assets for 1 year
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;

            # Enable validation of assets
            etag on;
            if_modified_since exact;
            
            # Gzip static assets
            gzip_static on;
            gzip_proxied any;

            # Add security headers
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";
            add_header Content-Security-Policy "default-src 'self'; object-src 'none';";

            # Limit requests to assets
            limit_req zone=assets burst=10 nodelay;
        }

        # Custom error pages
        error_page 403 /html/403.html;
        error_page 404 /html/404.html;
        error_page 500 /html/500.html;
        error_page 502 /html/502.html;
        error_page 503 /html/503.html;
        error_page 504 /html/504.html;

        location /html/ {
            internal;
        }
    }
}